<style>
  html, body { margin: 0; padding: 0; background: #0a0f1a; }
  body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  #root { min-height: 100vh; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  input:focus { outline: none; }
  ::selection { background: rgba(59,130,246,0.3); }
  .recharts-tooltip-wrapper { outline: none; }
  .recharts-default-tooltip { background: transparent !important; border: none !important; }

  /* KPI card hover lift — works regardless of theme */
  [data-kpi] { transition: transform 0.18s cubic-bezier(.3,.7,.4,1), box-shadow 0.18s; }
  [data-kpi]:hover { transform: translateY(-1px); }

  /* Sidebar scrollbar (webkit) */
  div[style*="position: sticky"]::-webkit-scrollbar { width: 6px; }
  div[style*="position: sticky"]::-webkit-scrollbar-track { background: transparent; }
  div[style*="position: sticky"]::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 3px; }
  div[style*="position: sticky"]::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.4); }
</style>
</head>

<div id="root"></div>
